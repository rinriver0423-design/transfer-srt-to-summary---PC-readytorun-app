<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Summarizer - 双语摘要</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .config-section {
            background: rgba(0, 217, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .config-section h3 {
            margin-bottom: 15px;
            color: #00d9ff;
            font-size: 1rem;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 6px;
            color: #aaa;
            font-size: 0.85rem;
        }

        .input-group input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .file-section {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .file-info {
            padding: 12px 16px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #00ff88;
            font-size: 0.9rem;
        }

        .file-info .filename {
            font-weight: 600;
            color: #00ff88;
        }

        .lang-detected {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lang-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .lang-badge.chinese {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
            border: 1px solid #ff5252;
        }

        .lang-badge.english {
            background: rgba(66, 165, 245, 0.2);
            color: #42a5f5;
            border: 1px solid #42a5f5;
        }

        .lang-badge.hidden {
            display: none;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .summary-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            min-height: 280px;
        }

        .summary-panel.chinese {
            border-top: 3px solid #ff5252;
        }

        .summary-panel.english {
            border-top: 3px solid #42a5f5;
        }

        .summary-panel h4 {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .summary-panel.chinese h4 {
            color: #ff5252;
        }

        .summary-panel.english h4 {
            color: #42a5f5;
        }

        .summary-content {
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .placeholder {
            color: #666;
            font-style: italic;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 217, 255, 0.2);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            color: #ff5252;
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .tip {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SRT Summarizer - 双语摘要</h1>

        <div class="config-section">
            <h3>⚙️ MiniMax API 配置</h3>
            <div class="config-row">
                <div class="input-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的 MiniMax API Key">
                </div>
                <div class="input-group">
                    <label for="groupId">Group ID</label>
                    <input type="text" id="groupId" placeholder="输入 Group ID">
                </div>
            </div>
        </div>

        <div class="file-section">
            <button class="btn btn-primary" id="importBtn" onclick="importFile()">
                📂 导入 SRT 文件
            </button>
            <button class="btn btn-secondary" id="summarizeBtn" onclick="summarize()" disabled>
                ✨ 生成双语摘要
            </button>
            <button class="btn btn-secondary" id="saveBtn" onclick="saveSummary()" disabled>
                💾 保存摘要
            </button>
        </div>

        <div class="file-info hidden" id="fileInfo">
            当前文件: <span class="filename" id="fileName"></span>
        </div>

        <div class="lang-detected" id="langDetected">
            <span class="lang-badge chinese hidden" id="chineseBadge">🇨🇳 检测到中文</span>
            <span class="lang-badge english hidden" id="englishBadge">🇬🇧 检测到英文</span>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在生成双语摘要...</p>
        </div>

        <div class="summary-grid">
            <div class="summary-panel chinese">
                <h4>🇨🇳 中文摘要</h4>
                <div class="summary-content" id="chineseSummary">
                    <span class="placeholder">导入文件后自动生成中文摘要...</span>
                </div>
            </div>
            <div class="summary-panel english">
                <h4>🇬🇧 English Summary</h4>
                <div class="summary-content" id="englishSummary">
                    <span class="placeholder">Import file to generate English summary...</span>
                </div>
            </div>
        </div>

        <div class="action-row">
            <button class="btn btn-secondary" id="saveAllBtn" onclick="saveAllSummaries()" disabled>
                💾 保存全部摘要
            </button>
        </div>

        <div class="error hidden" id="error"></div>
    </div>

    <script>
        let currentFile = null;
        let chineseSummaryText = '';
        let englishSummaryText = '';

        async function importFile() {
            try {
                const result = await window.electronAPI.selectFile();
                if (result) {
                    currentFile = result;
                    document.getElementById('fileName').textContent = result.filePath.split(/[/\\]/).pop();
                    document.getElementById('fileInfo').classList.remove('hidden');
                    document.getElementById('summarizeBtn').disabled = false;
                    document.getElementById('error').classList.add('hidden');

                    // Show detected languages
                    const chineseBadge = document.getElementById('chineseBadge');
                    const englishBadge = document.getElementById('englishBadge');
                    
                    chineseBadge.classList.toggle('hidden', !result.hasChinese);
                    englishBadge.classList.toggle('hidden', !result.hasEnglish);

                    // Reset summaries
                    document.getElementById('chineseSummary').innerHTML = '<span class="placeholder">导入文件后自动生成中文摘要...</span>';
                    document.getElementById('englishSummary').innerHTML = '<span class="placeholder">Import file to generate English summary...</span>';
                    chineseSummaryText = '';
                    englishSummaryText = '';
                    document.getElementById('saveAllBtn').disabled = true;
                }
            } catch (error) {
                showError('导入文件失败: ' + error.message);
            }
        }

        async function summarize() {
            if (!currentFile) return;

            const apiKey = document.getElementById('apiKey').value.trim();
            const groupId = document.getElementById('groupId').value.trim();

            if (!apiKey || !groupId) {
                showError('请先填写 API Key 和 Group ID');
                return;
            }

            document.getElementById('loading').classList.add('active');
            document.getElementById('summarizeBtn').disabled = true;
            document.getElementById('error').classList.add('hidden');

            try {
                // Generate Chinese summary if available
                if (currentFile.hasChinese && currentFile.chinese) {
                    document.getElementById('chineseSummary').innerHTML = '<span class="placeholder">正在生成中文摘要...</span>';
                    const cnResult = await window.electronAPI.summarize(currentFile.chinese, apiKey, groupId, 'chinese');
                    if (cnResult.success) {
                        chineseSummaryText = cnResult.summary;
                        document.getElementById('chineseSummary').textContent = cnResult.summary;
                    } else {
                        document.getElementById('chineseSummary').innerHTML = '<span class="placeholder">生成失败: ' + cnResult.error + '</span>';
                    }
                }

                // Generate English summary if available
                if (currentFile.hasEnglish && currentFile.english) {
                    document.getElementById('englishSummary').innerHTML = '<span class="placeholder">Generating English summary...</span>';
                    const enResult = await window.electronAPI.summarize(currentFile.english, apiKey, groupId, 'english');
                    if (enResult.success) {
                        englishSummaryText = enResult.summary;
                        document.getElementById('englishSummary').textContent = enResult.summary;
                    } else {
                        document.getElementById('englishSummary').innerHTML = '<span class="placeholder">Failed: ' + enResult.error + '</span>';
                    }
                }

                // Enable save if at least one summary exists
                if (chineseSummaryText || englishSummaryText) {
                    document.getElementById('saveAllBtn').disabled = false;
                }
            } catch (error) {
                showError('生成摘要时出错: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('summarizeBtn').disabled = false;
            }
        }

        async function saveAllSummaries() {
            if (!chineseSummaryText && !englishSummaryText) return;

            let content = 'SRT 双语摘要\n';
            content += '========================================\n\n';

            if (chineseSummaryText) {
                content += '【中文摘要】\n';
                content += chineseSummaryText;
                content += '\n\n';
            }

            if (englishSummaryText) {
                content += '【English Summary】\n';
                content += englishSummaryText;
                content += '\n';
            }

            content += '\n========================================\n';

            try {
                const saved = await window.electronAPI.saveSummary(content);
                if (saved) {
                    alert('双语摘要已保存!');
                }
            } catch (error) {
                showError('保存失败: ' + error.message);
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
